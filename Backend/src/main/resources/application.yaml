spring:
  application:
    name: Backend

  datasource:
    url: jdbc:postgresql://localhost:5432/containerops
    username: user
    password: user
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8081
